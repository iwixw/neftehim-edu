{% extends "base.html" %}
{% block title %}Регистрация · НефтехимОбучение{% endblock %}

{% block content %}
<div class="auth-card">
    <h1>Регистрация</h1>
    <form method="post" action="{{ url_for('auth.register') }}">
        <label>Логин
            <input type="text" name="login" required autofocus>
        </label>
        <label>ФИО (необязательно)
            <input type="text" name="full_name" placeholder="Иванов Иван Иванович">
        </label>
        <label>Пароль
            <input type="password" name="password" required>
        </label>
        <label>Повторите пароль
            <input type="password" name="password2" required>
        </label>
        <button class="btn btn-primary btn-block" type="submit">Создать аккаунт</button>
    </form>
    <p class="auth-switch">Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войти</a></p>
</div>
{% endblock %}

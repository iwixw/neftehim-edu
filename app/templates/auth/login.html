{% extends "base.html" %}
{% block title %}Вход · НефтехимОбучение{% endblock %}

{% block content %}
<div class="auth-card">
    <h1>Вход в систему</h1>
    <form method="post" action="{{ url_for('auth.login') }}">
        <label>Логин
            <input type="text" name="login" required autofocus>
        </label>
        <label>Пароль
            <input type="password" name="password" required>
        </label>
        <button class="btn btn-primary btn-block" type="submit">Войти</button>
    </form>
    <p class="auth-switch">Нет аккаунта? <a href="{{ url_for('auth.register') }}">Зарегистрироваться</a></p>
</div>
{% endblock %}

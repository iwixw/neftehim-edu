# Инфраструктура как код для Render.
# Создаёт веб-сервис (Flask + gunicorn) и бесплатную базу PostgreSQL.
services:
  - type: web
    name: neftehimproekt-edu
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    # сидирование БД перед стартом (идемпотентно) + запуск gunicorn на порту Render
    startCommand: "python seed.py && gunicorn wsgi:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_LOGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: neftehimproekt-db
          property: connectionString

databases:
  - name: neftehimproekt-db
    plan: free
